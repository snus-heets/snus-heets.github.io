<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:40px;
margin:0;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

p{
color:#555;
font-size:18px;
}

button{
background:black;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

button:hover{
opacity:.85;
}
</style>
</head>

<body>

<div class="container">
<h1>Welcome to Snus and Heets</h1>
<p>Easy cash orders. Fast and simple.</p>

<button>Shop Now</button>
</div>

</body>
</html>
