<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
}

/* ALL PAGES */
.page{
display:none;
width:100vw;
height:100vh;
overflow-y:auto;
}

.show{
display:block;
}

/* HOME */
#home{
position:relative;
background:#000;
}

#home.show{
display:flex;
justify-content:center;
align-items:center;
}
  
.neon{
position:absolute;
border-radius:50%;
filter:blur(15px);
opacity:.75;
animation:move 10s infinite alternate;
}

.n1{
width:180px;height:180px;
background:#00ffff;
top:10%;left:8%;
}

.n2{
width:220px;height:220px;
background:#ff00ff;
bottom:10%;right:8%;
}

.n3{
width:140px;height:140px;
background:#00ff66;
left:18%;bottom:25%;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(45px,-35px);}
}

.bubble{
position:relative;
z-index:5;
background:#fff;
padding:40px 32px;
border-radius:28px;
text-align:center;
width:280px;
max-width:85vw;
}

.bubble h1{
font-size:38px;
margin-bottom:20px;
}

.btn{
border:none;
background:#000;
color:#fff;
padding:14px 28px;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

/* BRANDS */
#brands{
background:#fff;
padding:20px 15px 90px;
}

.brandCard{
max-width:420px;
margin:0 auto 22px;
padding:18px;
border-radius:26px;
text-align:center;
background:linear-gradient(135deg,#111,#222,#111);
color:white;
box-shadow:0 10px 25px rgba(0,255,255,.15);
border:1px solid rgba(255,255,255,.08);
}

.brandCard img{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:18px;
margin-bottom:14px;
}

.brandCard h2{
margin-bottom:10px;
}

.brandCard img{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:18px;
margin-bottom:15px;
}

/* PRODUCTS */
#productsPage{
background:#fff;
padding:12px 12px 90px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
position:sticky;
top:0;
background:#fff;
padding:8px 0 12px;
z-index:10;
}

.back{
font-size:28px;
cursor:pointer;
padding:6px 10px;
}

.brandBubble{
background:#f1f1f1;
padding:10px 16px;
border-radius:18px;
font-weight:bold;
}

.row{
display:flex;
align-items:center;
gap:12px;
padding:12px 0;
border-bottom:1px solid #eee;
}

.row img{
width:72px;
height:72px;
object-fit:cover;
border-radius:14px;
}

.info{
flex:1;
}

.info h4{
font-size:17px;
margin-bottom:6px;
}

.info p{
font-size:14px;
color:#666;
}

.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
width:30px;
height:30px;
border:none;
border-radius:50%;
background:#000;
color:#fff;
font-size:18px;
cursor:pointer;
}

/* CART BAR */
#cartBar{
position:fixed;
left:0;
right:0;
bottom:0;
background:#000;
color:#fff;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
cursor:pointer;
}

/* CART PAGE */
#cartPage{
background:#fff;
padding:20px 15px 100px;
}

.cartLine{
padding:12px 0;
border-bottom:1px solid #eee;
}

.cartBtns{
display:flex;
gap:10px;
margin-top:20px;
}

.cartBtns button{
flex:1;
border:none;
background:#000;
color:#fff;
padding:14px;
border-radius:14px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="page show">
<div class="neon n1"></div>
<div class="neon n2"></div>
<div class="neon n3"></div>

<div class="bubble">
<h1>My Shop</h1>
<button class="btn" onclick="openBrands()">Order</button>
</div>
</section>

<!-- BRANDS -->
<section id="brands" class="page">
<div id="brandList"></div>
</section>

<!-- PRODUCTS -->
<section id="productsPage" class="page">
<div class="topbar">
<div class="back" onclick="openBrands()">←</div>
<div class="brandBubble" id="brandTitle">Brand 1</div>
</div>

<div id="productList"></div>
</section>

<!-- CART -->
<section id="cartPage" class="page">
<div class="topbar">
<div class="back" onclick="backFromCart()">←</div>
<div class="brandBubble">Cart</div>
</div>

<div id="cartItems"></div>

<div class="cartBtns">
<button onclick="copyOrder()">Copy</button>
<button onclick="backFromCart()">Back</button>
</div>
</section>

<!-- CART BAR -->
<div id="cartBar" onclick="openCart()">
<div id="cartCount">0 Items</div>
<div id="cartTotal">$0</div>
</div>

<script src="products.js"></script>

<script>
let currentBrand=1;
let previousPage="brands";
let cart={};

function hideAll(){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
}

function openBrands(){
hideAll();
document.getElementById("brands").classList.add("show");
renderBrands();
previousPage="brands";
}

function openBrand(id){
currentBrand=id;
hideAll();
document.getElementById("productsPage").classList.add("show");
document.getElementById("brandTitle").innerText="Brand "+id;
renderProducts();
previousPage="products";
}

function openCart(){
hideAll();
document.getElementById("cartPage").classList.add("show");
renderCart();
}

function backFromCart(){
if(previousPage==="products"){
openBrand(currentBrand);
}else{
openBrands();
}
}

function renderBrands(){
let brands=[...new Set(products.map(p=>p.brand))];
let html="";

brands.forEach(b=>{
html+=`
<div class="brandCard">
<img src="brand${b}.jpg">
<h2>Brand ${b}</h2>
<br>
<button class="btn" onclick="openBrand(${b})">Open</button>
</div>
`;
});

document.getElementById("brandList").innerHTML=html;
}

function renderProducts(){
let items=products.filter(p=>p.brand===currentBrand);
let html="";

items.forEach(p=>{
let key=p.brand+"-"+p.id;
let qty=cart[key]||0;

html+=`
<div class="row">
<img src="${p.brand}-${p.id}.jpg">

<div class="info">
<h4>${p.name}</h4>
<p>$${p.price}</p>
</div>

<div class="qty">
<button onclick="changeQty('${key}',-1)">-</button>
<span>${qty}</span>
<button onclick="changeQty('${key}',1)">+</button>
</div>
</div>
`;
});

document.getElementById("productList").innerHTML=html;
}

function changeQty(key,val){
cart[key]=(cart[key]||0)+val;

if(cart[key]<=0){
delete cart[key];
}

renderProducts();
updateCart();
}

function updateCart(){
let items=0,total=0;

for(let key in cart){
let qty=cart[key];
items+=qty;

let arr=key.split("-");
let brand=arr[0];
let id=arr[1];

let item=products.find(p=>p.brand==brand && p.id==id);
total+=item.price*qty;
}

document.getElementById("cartCount").innerText=items+" Items";
document.getElementById("cartTotal").innerText="$"+total;
}

function renderCart(){
let html="";
let total=0;

for(let key in cart){
let qty=cart[key];

let arr=key.split("-");
let brand=arr[0];
let id=arr[1];

let item=products.find(p=>p.brand==brand && p.id==id);

let line=item.price*qty;
total+=line;

html+=`
<div class="cartLine">
${item.name} - $${item.price} - ${qty} - $${line}
</div>
`;
}

if(html===""){
html="Cart is empty";
}

document.getElementById("cartItems").innerHTML=html;
document.getElementById("cartTotal").innerText="$"+total;
}

function copyOrder(){
let txt="";

for(let key in cart){
let qty=cart[key];

let arr=key.split("-");
let brand=arr[0];
let id=arr[1];

let item=products.find(p=>p.brand==brand && p.id==id);

txt+=item.name+" - "+qty+"\n";
}

navigator.clipboard.writeText(txt);
alert("Copied!");
}

updateCart();
renderBrands();
</script>

</body>
</html>
