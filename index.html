<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
overflow-x:hidden;
color:white;
}

/* Landing Page */
#home{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Neon animated circles */
.circle{
position:absolute;
border-radius:50%;
filter:blur(8px);
opacity:.8;
animation:float 10s infinite linear;
}

.circle1{
width:180px;
height:180px;
background:#00ffff;
top:10%;
left:5%;
}

.circle2{
width:220px;
height:220px;
background:#ff00ff;
bottom:15%;
right:8%;
animation-duration:14s;
}

.circle3{
width:140px;
height:140px;
background:#00ff66;
top:55%;
left:15%;
animation-duration:12s;
}

/* glowing steam lines */
.steam{
position:absolute;
width:300px;
height:300px;
border-radius:50%;
border:2px solid transparent;
border-top:2px solid #00ffff;
border-right:2px solid #ff00ff;
filter:blur(3px);
opacity:.5;
animation:spin 8s linear infinite;
}

.steam1{
top:15%;
right:20%;
}

.steam2{
bottom:10%;
left:20%;
animation-duration:12s;
}

/* Center bubble */
.center-box{
position:relative;
z-index:5;
background:rgba(255,255,255,.95);
color:black;
padding:40px 50px;
border-radius:30px;
text-align:center;
min-width:280px;
box-shadow:0 0 25px rgba(255,255,255,.25);
}

.center-box h1{
font-size:38px;
margin-bottom:20px;
}

.center-box button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:black;
color:white;
cursor:pointer;
}

.center-box button:hover{
opacity:.85;
}

/* Products Page */
#shop{
min-height:100vh;
padding:40px 20px;
background:#111;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:22px;
max-width:1100px;
margin:auto;
}

.card{
background:#fff;
color:black;
border-radius:20px;
padding:15px;
text-align:center;
box-shadow:0 0 15px rgba(255,255,255,.08);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:14px;
}

.card h3{
margin:12px 0 8px;
}

.card p{
margin-bottom:10px;
font-size:18px;
}

.card button{
padding:10px 16px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

@keyframes float{
0%{transform:translateY(0) translateX(0);}
25%{transform:translateY(-25px) translateX(20px);}
50%{transform:translateY(15px) translateX(-15px);}
75%{transform:translateY(-10px) translateX(10px);}
100%{transform:translateY(0) translateX(0);}
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- Landing -->
<section id="home">

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="steam steam1"></div>
<div class="steam steam2"></div>

<div class="center-box">
<h1>My Shop</h1>
<button onclick="goShop()">Order</button>
</div>

</section>

<!-- Shop Section -->
<section id="shop">
<div id="products"></div>
</section>

<script src="products.js"></script>

<script>
function goShop(){
document.getElementById("shop").scrollIntoView({
behavior:"smooth"
});
}

const container = document.getElementById("products");

products.forEach(item=>{
container.innerHTML += `
<div class="card">
<img src="${item.id}.jpg">
<h3>${item.name}</h3>
<p>$${item.price}</p>
<button>Add to Cart</button>
</div>
`;
});
</script>

</body>
</html>
