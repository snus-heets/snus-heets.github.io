<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;}

/* pages */
.page{display:none;min-height:100vh;}
.active{display:block;}

/* HOME */
#home{
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.bubble{
background:#fff;
color:#000;
padding:40px;
border-radius:28px;
text-align:center;
z-index:2;
min-width:280px;
}

.bubble h1{font-size:38px;margin-bottom:20px;}

.btn{
border:none;
padding:14px 28px;
border-radius:12px;
background:#000;
color:#fff;
font-size:18px;
cursor:pointer;
}

.neon{
position:absolute;
border-radius:50%;
filter:blur(12px);
opacity:.75;
animation:float 10s infinite alternate;
}

.n1{width:180px;height:180px;background:#00ffff;top:8%;left:8%;}
.n2{width:220px;height:220px;background:#ff00ff;right:8%;bottom:10%;}
.n3{width:140px;height:140px;background:#00ff66;left:18%;bottom:18%;}

@keyframes float{
0%{transform:translate(0,0);}
100%{transform:translate(40px,-35px);}
}

/* BRANDS */
#brands{
background:#fff;
color:#000;
padding:25px 15px 90px;
}

.brandCard{
background:#f5f5f5;
border-radius:25px;
padding:20px;
margin:18px auto;
max-width:420px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.brandCard img{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:18px;
margin-bottom:15px;
}

/* PRODUCTS */
#productsPage{
background:#fff;
color:#000;
padding:12px 12px 95px;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
position:sticky;
top:0;
background:#fff;
padding:10px 0;
z-index:10;
}

.backBtn{
font-size:26px;
cursor:pointer;
padding:6px 10px;
}

.search{
flex:1;
padding:12px;
border:none;
background:#f1f1f1;
border-radius:20px;
font-size:16px;
}

.brandName{
background:#f1f1f1;
padding:10px 14px;
border-radius:18px;
white-space:nowrap;
}

.row{
display:flex;
gap:12px;
align-items:center;
padding:12px;
border-bottom:1px solid #eee;
}

.row img{
width:72px;
height:72px;
object-fit:cover;
border-radius:14px;
}

.info{flex:1;}
.info h4{font-size:17px;margin-bottom:6px;}
.info p{font-size:14px;color:#555;}

.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
width:30px;
height:30px;
border:none;
border-radius:50%;
background:#000;
color:#fff;
font-size:18px;
cursor:pointer;
}

/* CART BAR */
#cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
color:#fff;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:50;
cursor:pointer;
}

/* CART PAGE */
#cartPage{
background:#fff;
color:#000;
padding:20px 15px 100px;
}

.cartItem{
padding:10px 0;
border-bottom:1px solid #eee;
}

.cartBtns{
display:flex;
gap:10px;
margin-top:20px;
}

.cartBtns button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:#000;
color:#fff;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="page active">
<div class="neon n1"></div>
<div class="neon n2"></div>
<div class="neon n3"></div>

<div class="bubble">
<h1>My Shop</h1>
<button class="btn" onclick="showPage('brands')">Order</button>
</div>
</section>

<!-- BRANDS -->
<section id="brands" class="page">
<div id="brandList"></div>
</section>

<!-- PRODUCTS -->
<section id="productsPage" class="page">
<div class="topbar">
<div class="backBtn" onclick="showPage('brands')">←</div>
<input class="search" id="searchBox" placeholder="Search..." oninput="renderProducts()">
<div class="brandName" id="brandTitle">Brand</div>
</div>

<div id="productList"></div>
</section>

<!-- CART -->
<section id="cartPage" class="page">
<div class="topbar">
<div class="backBtn" onclick="backFromCart()">←</div>
<div style="font-weight:bold;">Cart</div>
<div></div>
</div>

<div id="cartItems"></div>

<div class="cartBtns">
<button onclick="copyOrder()">Copy Order</button>
<button onclick="backFromCart()">Back</button>
</div>
</section>

<!-- FIXED CART BAR -->
<div id="cartBar" onclick="openCart()">
<div id="cartCount">0 Items</div>
<div id="cartTotal">$0</div>
</div>

<script src="products.js"></script>

<script>
let currentPage="home";
let currentBrand=1;
let cart={};

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
currentPage=id;
window.scrollTo(0,0);
if(id==="brands") renderBrands();
if(id==="cartPage") renderCart();
}

function renderBrands(){
const wrap=document.getElementById("brandList");
let brands=[...new Set(products.map(p=>p.brand))];
wrap.innerHTML="";
brands.forEach(b=>{
wrap.innerHTML+=`
<div class="brandCard">
<img src="brand${b}.jpg">
<h2>Brand ${b}</h2>
<br>
<button class="btn" onclick="openBrand(${b})">Open</button>
</div>`;
});
}

function openBrand(id){
currentBrand=id;
document.getElementById("brandTitle").innerText="Brand "+id;
document.getElementById("searchBox").value="";
showPage("productsPage");
renderProducts();
}

function renderProducts(){
let q=document.getElementById("searchBox").value.toLowerCase();
const wrap=document.getElementById("productList");

let items=products.filter(p=>p.brand===currentBrand && p.name.toLowerCase().includes(q));

wrap.innerHTML="";
items.forEach(p=>{
let key=p.brand+"-"+p.id;
let qty=cart[key]||0;

wrap.innerHTML+=`
<div class="row">
<img src="${p.brand}-${p.id}.jpg">
<div class="info">
<h4>${p.name}</h4>
<p>$${p.price}</p>
</div>

<div class="qty">
<button onclick="changeQty('${key}',-1)">-</button>
<span>${qty}</span>
<button onclick="changeQty('${key}',1)">+</button>
</div>
</div>`;
});
}

function changeQty(key,val){
cart[key]=(cart[key]||0)+val;
if(cart[key]<=0) delete cart[key];
renderProducts();
updateCartBar();
}

function updateCartBar(){
let items=0,total=0;

for(let key in cart){
let qty=cart[key];
items+=qty;

let [brand,id]=key.split("-");
let item=products.find(p=>p.brand==brand && p.id==id);
total+=item.price*qty;
}

document.getElementById("cartCount").innerText=items+" Items";
document.getElementById("cartTotal").innerText="$"+total;
}

function openCart(){
showPage("cartPage");
}

function renderCart(){
const wrap=document.getElementById("cartItems");
wrap.innerHTML="";

let total=0;

for(let key in cart){
let qty=cart[key];
let [brand,id]=key.split("-");
let item=products.find(p=>p.brand==brand && p.id==id);
let line=item.price*qty;
total+=line;

wrap.innerHTML+=`
<div class="cartItem">
${item.name} - $${item.price} - ${qty} - $${line}
</div>`;
}

if(wrap.innerHTML==="") wrap.innerHTML="Cart is empty";
document.getElementById("cartTotal").innerText="$"+total;
}

function copyOrder(){
let txt="";

for(let key in cart){
let qty=cart[key];
let [brand,id]=key.split("-");
let item=products.find(p=>p.brand==brand && p.id==id);
txt+=item.name+" - "+qty+"\n";
}

navigator.clipboard.writeText(txt);
alert("Copied!");
}

function backFromCart(){
if(currentBrand) showPage("productsPage");
else showPage("brands");
}

renderBrands();
updateCartBar();
</script>

</body>
</html>
